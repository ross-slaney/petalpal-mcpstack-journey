<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PetalPal API</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f7fbf2;
        color: #172018;
      }
      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(circle at 20% 18%, rgba(124, 201, 80, 0.22), transparent 28%),
          radial-gradient(circle at 82% 22%, rgba(56, 189, 248, 0.18), transparent 28%),
          linear-gradient(180deg, #ffffff 0%, #f7fbf2 100%);
      }
      main {
        display: grid;
        min-height: 100vh;
        place-items: center;
        padding: 32px;
      }
      .shell {
        width: min(960px, 100%);
        display: grid;
        gap: 24px;
        grid-template-columns: minmax(0, 1.1fr) minmax(280px, 0.9fr);
        align-items: center;
      }
      .eyebrow {
        color: #4d7f25;
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }
      h1 {
        margin: 14px 0 0;
        max-width: 560px;
        font-size: clamp(42px, 7vw, 72px);
        line-height: 0.94;
        letter-spacing: -0.04em;
      }
      p {
        color: #516150;
        font-size: 17px;
        line-height: 1.7;
        margin: 20px 0 0;
        max-width: 600px;
      }
      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 28px;
      }
      a {
        align-items: center;
        border: 1px solid rgba(23, 32, 24, 0.14);
        border-radius: 10px;
        color: #172018;
        display: inline-flex;
        font-weight: 750;
        gap: 8px;
        padding: 11px 14px;
        text-decoration: none;
      }
      a.primary {
        background: #aaf244;
        border-color: #95d93a;
        box-shadow: 0 16px 40px -26px rgba(86, 132, 28, 0.75);
      }
      .garden {
        aspect-ratio: 1;
        border: 1px solid rgba(23, 32, 24, 0.12);
        border-radius: 24px;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.86), rgba(255, 255, 255, 0.58));
        box-shadow: 0 38px 100px -48px rgba(23, 32, 24, 0.42);
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 16px;
        padding: 28px;
      }
      .plant {
        border-radius: 18px;
        background: #ffffff;
        box-shadow: inset 0 -16px 0 rgba(124, 201, 80, 0.12);
        display: grid;
        place-items: center;
        position: relative;
      }
      .plant::before {
        content: "";
        width: 44%;
        height: 52%;
        border-radius: 999px 999px 8px 8px;
        background: linear-gradient(160deg, #78c850, #38bdf8);
        transform: rotate(var(--turn));
      }
      .plant::after {
        bottom: 18%;
        color: #719069;
        content: attr(data-label);
        font-size: 11px;
        font-weight: 800;
        letter-spacing: 0.08em;
        position: absolute;
        text-transform: uppercase;
      }
      @media (max-width: 820px) {
        .shell {
          grid-template-columns: 1fr;
        }
        .garden {
          max-width: 420px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="shell" aria-labelledby="title">
        <div>
          <div class="eyebrow">SqlOS OAuth + FGA sample</div>
          <h1 id="title">PetalPal gives ChatGPT a tiny garden to tend.</h1>
          <p>
            This API is intentionally small: sign in through SqlOS, let FGA create a per-user
            garden resource, then expose plant tools through MCP Stack for ChatGPT.
          </p>
          <div class="actions">
            <a class="primary" href="/swagger">OpenAPI</a>
            <a href="/sample/config">OAuth config</a>
            <a href="/sqlos">SqlOS dashboard</a>
          </div>
        </div>
        <div class="garden" aria-label="PetalPal garden preview">
          <div class="plant" data-label="mint" style="--turn: -8deg"></div>
          <div class="plant" data-label="fern" style="--turn: 8deg"></div>
          <div class="plant" data-label="moss" style="--turn: -4deg"></div>
          <div class="plant" data-label="sage" style="--turn: 6deg"></div>
          <div class="plant" data-label="basil" style="--turn: -10deg"></div>
          <div class="plant" data-label="sprout" style="--turn: 4deg"></div>
        </div>
      </section>
    </main>
  </body>
</html>
